spring.application.name=travel-agency-backend

# 1. Database Connection (Using Environment Variable)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/travel_agency_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. Swagger / OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.oauth.client-id=sisgr-frontend

# Configuración de Seguridad con Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/sisgr-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/sisgr-realm/protocol/openid-connect/certs

keycloak.client-id=sisgr-backend
keycloak.client-secret=XZHhTtsoQyiuS5mefcDAHOOpDOQfOCPt

# 4. Server Port (Matching your professor's notes)
server.port=8090

# Keycloak Admin API
keycloak.admin.server-url=${KEYCLOAK_URL:http://localhost:9090}
keycloak.admin.realm=${KEYCLOAK_REALM:sisgr-realm}
keycloak.admin.client-id=${KEYCLOAK_CLIENT_ID:sisgr-backend}
keycloak.admin.client-secret=${KEYCLOAK_CLIENT_SECRET:XZHhTtsoQyiuS5mefcDAHOOpDOQfOCPt}