name: Backend - CI/CD

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:

  build:
    name: Build JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generate JAR (skip tests)
        working-directory: backend/travel-agency-backend
        run: mvn clean package -DskipTests

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/travel-agency-backend/target/travelagency-backend.jar

  test:
    name: Run JUnit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run unit tests
        working-directory: backend/travel-agency-backend
        run: mvn test

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download generated JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/travel-agency-backend/target

      - name: Build Docker image
        working-directory: backend/travel-agency-backend
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/travel-agency-backend:latest .

      - name: Save Docker image as file
        run: docker save ${{ secrets.DOCKERHUB_USERNAME }}/travel-agency-backend:latest -o backend-image.tar

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: backend-image.tar

  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: backend-docker-image
          path: .

      - name: Load Docker image
        run: docker load -i backend-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/travel-agency-backend:latest
