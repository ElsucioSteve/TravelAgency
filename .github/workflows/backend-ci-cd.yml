name: Backend - CI/CD

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:

  test:
    name: Run JUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run unit tests
        working-directory: backend/travel-agency-backend
        run: mvn test

  build-and-push:
    name: Build JAR, Docker Image and Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generate JAR (skip tests)
        working-directory: backend/travel-agency-backend
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: backend/travel-agency-backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/travel-agency-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/travel-agency-backend:latest
